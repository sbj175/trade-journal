[pytest]
testpaths = tests
addopts =
    -ra
    --strict-markers
    --ignore=tests/unit/test_tenant_isolation.py
    --ignore=tests/unit/test_order_models.py
filterwarnings =
    ignore::DeprecationWarning
markers =
    slow: marks tests as slow

# Quarantined files (the two --ignore entries above) are stale tests for the
# removed Order/OrderPosition schema. They will be repaired or deleted as part
# of OPT-272 (test strategy + coverage growth).
